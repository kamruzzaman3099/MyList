<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TS Stream Player</title>

<script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>

<style>
body{
    margin:0;
    background:#000;
}
video{
    width:100%;
    height:100vh;
}
</style>
</head>
<body>

<video id="video" controls autoplay muted></video>

<script>
const video = document.getElementById('video');

if (mpegts.getFeatureList().mseLivePlayback) {

    const player = mpegts.createPlayer({
        type: 'mpegts',
        isLive: true,
        url: 'http://starhub.pro/live/Anthony2/Anthony123/171.ts'
    });

    player.attachMediaElement(video);
    player.load();
    player.play();

    player.on(mpegts.Events.ERROR, function(errorType, errorDetail) {
        console.log(errorType, errorDetail);
    });

} else {
    alert('Browser does not support MPEG-TS playback');
}
</script>

</body>
</html>
