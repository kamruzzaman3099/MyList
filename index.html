<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>M3U Player</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.6.0/video-js.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.6.0/video.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
</head>
<body>
  <input type="file" id="m3uFile" accept=".m3u,.m3u8">
  <ul id="playlist"></ul>
  <video id="player" class="video-js vjs-default-skin" controls width="640" height="360"></video>

  <script>
    document.getElementById('m3uFile').addEventListener('change', function(e) {
      const reader = new FileReader();
      reader.onload = function(event) {
        const lines = event.target.result.split('\n');
        const list = document.getElementById('playlist');
        list.innerHTML = '';
        let title = '';

        lines.forEach(line => {
          line = line.trim();
          if (line.startsWith('#EXTINF')) {
            title = line.split(',')[1] || 'Channel';
          } else if (line && !line.startsWith('#')) {
            const li = document.createElement('li');
            li.textContent = title || line;
            li.style.cursor = 'pointer';
            li.addEventListener('click', () => playStream(line));
            list.appendChild(li);
            title = '';
          }
        });
      };
      reader.readAsText(e.target.files[0]);
    });

    function playStream(url) {
      const video = document.getElementById('player');
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        video.play();
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.play();
      }
    }
  </script>
</body>
</html>
