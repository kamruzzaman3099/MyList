<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MatchDay Insight</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="frame-ancestors *;">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: Arial, sans-serif; overflow: hidden; height: 100vh; width: 100vw; }

        /* Full Screen Player Area */
        .player-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* Error Overlay */
        .error-msg {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            background: rgba(229,0,0,0.9);
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
            z-index: 10;
        }

        /* Bottom Info Bar */
        .info-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .title { font-size: 0.9rem; font-weight: bold; color: #eee; }

        /* Share Button */
        .share-btn {
            background: #e50000;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .share-btn:hover { background: #ff1a1a; }
        .share-btn svg { width: 14px; height: 14px; fill: currentColor; }

        /* Toast Notification */
        #toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1db954;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 2000;
        }
    </style>
</head>
<body>

<div class="player-container">
    <video id="video" controls autoplay playsinline></video>
    
    <div class="error-msg" id="errorMsg">
        ⚠️ Stream failed to load.<br>Link may be expired or offline.
    </div>

    <div class="info-bar">
        <div class="title">T Sports Live</div>
        <button class="share-btn" onclick="copyEmbed()">
            <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
            Copy Embed Code
        </button>
    </div>
</div>

<div id="toast">✅ Embed code copied to clipboard!</div>

<script>
    const video = document.getElementById('video');
    const errorMsg = document.getElementById('errorMsg');
    const streamUrl = 'https://mflixott.com/tv/plusbox/live/TSports/index.m3u8';
    let hls = null;

    function initPlayer() {
        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) errorMsg.style.display = 'block';
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
        } 
        else {
            errorMsg.style.display = 'block';
        }
    }

    function copyEmbed() {
        const pageUrl = window.location.href.split('?')[0];
        const embedCode = `<iframe src="${pageUrl}" width="100%" height="480px" frameborder="0" allowfullscreen allow="autoplay; encrypted-media" style="background:#000;"></iframe>`;
        
        navigator.clipboard.writeText(embedCode).then(() => {
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        });
    }

    window.onload = initPlayer;
</script>

</body>
</html>
