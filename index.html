<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>T Sports Live</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Allow embedding from any origin -->
<meta http-equiv="Content-Security-Policy" content="frame-ancestors *;">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0d; color: #fff; font-family: Arial, sans-serif; display: flex; flex-direction: column; min-height: 100vh; }

  header { background: #1a1a1a; padding: 12px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid #e50000; }
  header h1 { font-size: 1.2rem; color: #fff; }
  .live-badge { background: #e50000; color: white; padding: 4px 10px; font-weight: bold; border-radius: 4px; font-size: 0.85rem; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }

  .main { display: flex; flex: 1; height: calc(100vh - 52px); }

  /* Sidebar */
  .sidebar { width: 260px; min-width: 200px; background: #161616; display: flex; flex-direction: column; border-right: 1px solid #2a2a2a; }
  .sidebar-header { padding: 10px; border-bottom: 1px solid #2a2a2a; }
  .sidebar-header input[type="text"] { width: 100%; padding: 7px 10px; background: #222; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: 0.85rem; outline: none; }
  .sidebar-header input[type="text"]::placeholder { color: #666; }
  .load-btn { margin-top: 7px; width: 100%; padding: 7px; background: #e50000; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.88rem; font-weight: bold; }
  .load-btn:hover { background: #c00; }
  .file-label { display: block; margin-top: 6px; width: 100%; padding: 6px; background: #222; color: #aaa; border: 1px dashed #444; border-radius: 6px; cursor: pointer; font-size: 0.78rem; text-align: center; }
  .file-label:hover { border-color: #e50000; color: #fff; }
  #fileInput { display: none; }

  .channel-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .channel-list::-webkit-scrollbar { width: 4px; }
  .channel-list::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  .channel-item { padding: 10px 14px; cursor: pointer; border-left: 3px solid transparent; font-size: 0.86rem; color: #ccc; transition: all 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .channel-item:hover { background: #222; color: #fff; border-left-color: #e50000; }
  .channel-item.active { background: #1f1f1f; color: #fff; border-left-color: #e50000; }
  .empty-msg { padding: 16px; color: #555; font-size: 0.8rem; text-align: center; line-height: 1.6; }

  /* Player */
  .player-area { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
  .video-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
  video { width: 100%; height: 100%; max-height: calc(100vh - 120px); object-fit: contain; }
  .now-playing { background: #111; padding: 8px 16px; font-size: 0.86rem; color: #aaa; border-top: 1px solid #222; }
  .now-playing span { color: #fff; font-weight: bold; }
  .error-msg { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(229,0,0,0.88); padding: 14px 22px; border-radius: 8px; font-size: 0.9rem; text-align: center; z-index: 10; }

  /* ── Embed Button (bottom-right) ── */
  .embed-fab { position: fixed; bottom: 20px; right: 20px; background: #e50000; color: #fff; border: none; border-radius: 50px; padding: 10px 18px; font-size: 0.85rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 7px; box-shadow: 0 4px 14px rgba(0,0,0,0.5); z-index: 1000; transition: background 0.2s; }
  .embed-fab:hover { background: #c00; }
  .embed-fab svg { width: 16px; height: 16px; fill: white; }

  /* ── Embed Modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 2000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 24px; width: 90%; max-width: 560px; position: relative; }
  .modal h2 { font-size: 1.1rem; margin-bottom: 6px; color: #fff; }
  .modal p { font-size: 0.82rem; color: #888; margin-bottom: 14px; }
  .modal label { font-size: 0.82rem; color: #aaa; display: block; margin-bottom: 5px; margin-top: 12px; }
  .modal input[type="number"], .modal select {
    width: 100%; padding: 7px 10px; background: #222; border: 1px solid #444; border-radius: 6px;
    color: #fff; font-size: 0.85rem; outline: none;
  }
  .size-row { display: flex; gap: 10px; }
  .size-row > div { flex: 1; }
  .code-box { background: #0d0d0d; border: 1px solid #333; border-radius: 6px; padding: 10px 12px; font-family: monospace; font-size: 0.78rem; color: #7ec8e3; word-break: break-all; margin-top: 12px; max-height: 100px; overflow-y: auto; white-space: pre-wrap; }
  .modal-actions { display: flex; gap: 10px; margin-top: 14px; }
  .btn-copy { flex: 1; padding: 9px; background: #e50000; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.88rem; }
  .btn-copy:hover { background: #c00; }
  .btn-copy.copied { background: #1db954; }
  .btn-close-modal { padding: 9px 16px; background: #333; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.88rem; }
  .btn-close-modal:hover { background: #444; }
  .modal-close-x { position: absolute; top: 12px; right: 14px; background: none; border: none; color: #666; font-size: 1.2rem; cursor: pointer; line-height: 1; }
  .modal-close-x:hover { color: #fff; }

  @media (max-width: 600px) {
    .main { flex-direction: column; height: auto; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #2a2a2a; max-height: 240px; }
    video { max-height: 220px; }
  }
</style>
</head>
<body>

<header>
  <span class="live-badge">🔴 LIVE</span>
  <h1>T Sports Live</h1>
</header>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <input type="text" id="m3uUrl" placeholder="Paste M3U URL here...">
      <button class="load-btn" onclick="loadFromUrl()">Load Playlist</button>
      <label class="file-label">
        📁 Or load local .m3u file
        <input type="file" id="fileInput" accept=".m3u,.m3u8" onchange="loadFromFile(this)">
      </label>
    </div>
    <div class="channel-list" id="channelList">
      <div class="channel-item active" id="defaultChannel">📺 T Sports</div>
      <div class="empty-msg" style="font-size:0.76rem;padding-top:6px;">Load an M3U playlist above<br>to add more channels.</div>
    </div>
  </div>

  <!-- Player -->
  <div class="player-area">
    <div class="video-wrap">
      <video id="video" controls autoplay playsinline></video>
      <div class="error-msg" id="errorMsg">
        ⚠️ Stream failed to load.<br>
        Channel may be offline or<br>blocked by CORS policy.
      </div>
    </div>
    <div class="now-playing" id="nowPlaying">Now Playing: <span>T Sports</span></div>
  </div>
</div>

<!-- Embed FAB Button -->
<button class="embed-fab" onclick="openModal()">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M8.293 6.293 2.586 12l5.707 5.707 1.414-1.414L5.414 12l4.293-4.293zm7.414 0-1.414 1.414L18.586 12l-4.293 4.293 1.414 1.414L21.414 12z"/>
  </svg>
  Get Embed Code
</button>

<!-- Embed Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <button class="modal-close-x" onclick="closeModal()">✕</button>
    <h2>📋 Embed This Player</h2>
    <p>Copy the code below and paste it into any WordPress page using an <strong>HTML block</strong>.</p>

    <div class="size-row">
      <div>
        <label>Width</label>
        <select id="embedWidth" onchange="updateCode()">
          <option value="100%">100% (Responsive)</option>
          <option value="800px">800px</option>
          <option value="640px">640px</option>
          <option value="560px">560px (WP default)</option>
          <option value="480px">480px</option>
        </select>
      </div>
      <div>
        <label>Height</label>
        <input type="number" id="embedHeight" value="480" min="200" max="900" oninput="updateCode()">
      </div>
    </div>

    <label>Embed Code</label>
    <div class="code-box" id="embedCode"></div>

    <div class="modal-actions">
      <button class="btn-copy" id="copyBtn" onclick="copyCode()">📋 Copy Code</button>
      <button class="btn-close-modal" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
  var video = document.getElementById('video');
  var hlsInstance = null;
  var currentStreamUrl = 'https://mflixott.com/tv/plusbox/live/TSports/index.m3u8';
  var currentTitle = 'T Sports';

  document.getElementById('defaultChannel').addEventListener('click', function() {
    document.querySelectorAll('.channel-item').forEach(function(el){ el.classList.remove('active'); });
    this.classList.add('active');
    playStream('https://mflixott.com/tv/plusbox/live/TSports/index.m3u8', 'T Sports');
  });

  playStream('https://mflixott.com/tv/plusbox/live/TSports/index.m3u8', 'T Sports');

  /* ── M3U Loading ── */
  function loadFromUrl() {
    var url = document.getElementById('m3uUrl').value.trim();
    if (!url) return alert('Please enter an M3U URL.');
    fetch(url)
      .then(function(r){ return r.text(); })
      .then(parseM3U)
      .catch(function(){ alert('Could not load playlist. The server may block CORS.'); });
  }

  function loadFromFile(input) {
    var file = input.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e){ parseM3U(e.target.result); };
    reader.readAsText(file);
  }

  function parseM3U(text) {
    var lines = text.split('\n'), channels = [], title = '';
    lines.forEach(function(line){
      line = line.trim();
      if (line.startsWith('#EXTINF')) {
        var parts = line.split(',');
        title = parts[1] ? parts[1].trim() : 'Channel';
      } else if (line && !line.startsWith('#')) {
        channels.push({ title: title || line, url: line });
        title = '';
      }
    });
    renderChannels(channels);
  }

  function renderChannels(channels) {
    var list = document.getElementById('channelList');
    if (!channels.length) { list.innerHTML = '<div class="empty-msg">No channels found.</div>'; return; }
    list.innerHTML = '';

    var search = document.createElement('input');
    search.type = 'text';
    search.placeholder = '🔍 Search channels...';
    search.style.cssText = 'width:calc(100% - 20px);margin:8px 10px;padding:7px 10px;background:#222;border:1px solid #333;border-radius:6px;color:#fff;font-size:0.83rem;outline:none;display:block;';
    list.appendChild(search);

    var ul = document.createElement('div');
    list.appendChild(ul);

    channels.forEach(function(ch, i){
      var item = document.createElement('div');
      item.className = 'channel-item';
      item.textContent = (i+1) + '. ' + ch.title;
      item.title = ch.url;
      item.addEventListener('click', function(){
        document.querySelectorAll('.channel-item').forEach(function(el){ el.classList.remove('active'); });
        item.classList.add('active');
        playStream(ch.url, ch.title);
      });
      ul.appendChild(item);
    });

    search.addEventListener('input', function(){
      var q = this.value.toLowerCase();
      ul.querySelectorAll('.channel-item').forEach(function(el){
        el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    });

    ul.firstChild.classList.add('active');
    playStream(channels[0].url, channels[0].title);
  }

  /* ── Player ── */
  function playStream(url, title) {
    currentStreamUrl = url;
    currentTitle = title;
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('nowPlaying').innerHTML = 'Now Playing: <span>' + (title || url) + '</span>';

    if (hlsInstance){ hlsInstance.destroy(); hlsInstance = null; }

    if (Hls.isSupported()) {
      hlsInstance = new Hls({ enableWorker: true });
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.ERROR, function(e, data){
        if (data.fatal) document.getElementById('errorMsg').style.display = 'block';
      });
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, function(){ video.play(); });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.play();
    } else {
      document.getElementById('errorMsg').style.display = 'block';
    }

    // Update embed code if modal is open
    updateCode();
  }

  /* ── Embed Modal ── */
  function getPageUrl() {
    return window.location.href.split('?')[0].split('#')[0];
  }

  function buildEmbedCode() {
    var w = document.getElementById('embedWidth').value;
    var h = document.getElementById('embedHeight').value;
    var src = getPageUrl() + '?stream=' + encodeURIComponent(currentStreamUrl) + '&title=' + encodeURIComponent(currentTitle);
    return '<iframe src="' + src + '" width="' + w + '" height="' + h + 'px" frameborder="0" allowfullscreen allow="autoplay; encrypted-media" scrolling="no" style="border:none;max-width:100%;"></iframe>';
  }

  function updateCode() {
    var box = document.getElementById('embedCode');
    if (box) box.textContent = buildEmbedCode();
  }

  function openModal() {
    updateCode();
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    var btn = document.getElementById('copyBtn');
    btn.textContent = '📋 Copy Code';
    btn.classList.remove('copied');
  }

  function closeModalOutside(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function copyCode() {
    var code = buildEmbedCode();
    var btn = document.getElementById('copyBtn');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(code).then(function(){
        btn.textContent = '✅ Copied!';
        btn.classList.add('copied');
        setTimeout(function(){ btn.textContent = '📋 Copy Code'; btn.classList.remove('copied'); }, 2500);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = code;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.textContent = '✅ Copied!';
      btn.classList.add('copied');
      setTimeout(function(){ btn.textContent = '📋 Copy Code'; btn.classList.remove('copied'); }, 2500);
    }
  }

  /* ── Handle ?stream= param when loaded inside an iframe ── */
  (function(){
    var params = new URLSearchParams(window.location.search);
    var s = params.get('stream');
    var t = params.get('title');
    if (s) {
      playStream(decodeURIComponent(s), t ? decodeURIComponent(t) : s);
    }
  })();
</script>
</body>
</html>
